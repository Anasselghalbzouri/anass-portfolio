<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Base gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>
    <!-- Glass border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(21,101,192,0.45)"/>
    </filter>
  </defs>

  <!-- Base rounded rect with gradient -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16"
        fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Frosted glass overlay (bottom half) -->
  <rect x="2" y="32" width="60" height="30" rx="0" ry="0"
        fill="rgba(255,255,255,0.08)"/>
  <rect x="2" y="46" width="60" height="16" rx="0" ry="0"
        fill="rgba(255,255,255,0.05)"/>
  <!-- Round bottom corners of frost -->
  <rect x="2" y="46" width="60" height="16" rx="16" ry="16"
        fill="rgba(255,255,255,0.05)"/>

  <!-- Glossy top highlight -->
  <rect x="4" y="4" width="56" height="28" rx="14" ry="14"
        fill="url(#glassHighlight)" opacity="0.7"/>

  <!-- Glass border -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="15.5" ry="15.5"
        fill="none" stroke="url(#borderGrad)" stroke-width="1.2"/>

  <!-- Code symbol </> in white -->
  <text x="32" y="41"
        font-family="'Courier New', monospace"
        font-size="20"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="-1"
        opacity="0.95">&lt;/&gt;</text>

  <!-- Small shine dot top-right -->
  <circle cx="48" cy="16" r="3.5" fill="rgba(255,255,255,0.45)"/>
</svg>
